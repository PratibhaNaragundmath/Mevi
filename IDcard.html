<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: blanchedalmond;
            border:#0f0808 solid 2px;
        }
        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        .card h3 {
            margin: 0;
            font-size: 20px;
        }
        .card p {
            margin: 5px 0;
            font-size: 14px;
            color: #555;
            text-align: left;
        }
        .hover-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .hover-btn:hover {
            background-color: #a5232b;
        }
        
    </style>
</head>
<body>
    <div class="card">
        <img src="C:\Users\prati\OneDrive\Pictures\Camera imports\2024-11-28\36838.jpg" alt="Pratibha" >
        <h3>Pratibha Naragundmath</h3>
        <p class="email">Email: pratibhanaragundmath@gmail.com</p>
        <p class="phone">Phone: 123-456-7890</p>
        <p class="address">Address: 123 Main Street, City, Country</p>
        <p class="dob">Date of Birth: January 1, 1990</p>
        <p class="id">ID Number: 123456789</p>
        <p class="year">Year of Issue: 2024</p>
        <button class="hover-btn">Click Me</button>
    </div>
</body>
</html>
