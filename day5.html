<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        .hover-btn{
            background-color: blue;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;/*changes the cursor to a pointer when hovering over the button*/
        }
        .hover-btn:hover{/*the :hover pseudo-class is used to apply styles to an element when the user hovers over it with the mouse pointer*/
            background-color: rgb(239, 130, 14);
        }
       
        .transition{
            width: 200px;
            height: 200px;
            transition-property: background-color, transform;
            background-color: rgb(49, 149, 29);
            transition: transform 1s ; /*smooth transition effect when the background color changes on hover*/
            transition-delay: 1s;
        }
        .transition:hover{
            background-color: rgb(239, 130, 14);
            transform: rotate(360deg); /*rotates the element 360 degrees when hovered over*/
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: rgb(83, 29, 149);
            transition-delay: 1s;
            transition: transform 1s linear; /*delay before the transition starts and the easing function that controls the acceleration of the transition*/
        }
        .box:hover{
            background-color: rgb(239, 130, 14);
            transform:scale(2.5); /*rotates the element 360 degrees when hovered over*/
        }
    </style>
</head>
<body>
    <!--hover-->
    <button class="hover-btn">Hover me</button><br>
    <br>
    <div class="transition">

    </div>
    <br>
    <div class="box"></div>
    <hr>
    
    </body>
</body>
</html>
