<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body style="background-image: url('https://tse1.mm.bing.net/th/id/OIP.9J1SZx9B27_fIEWOxCPiyAHaF7?pid=Api&P=0&h=180'); background-size: cover;">
    <header>
        <h1>Login Form</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
    <section>
        <h2>Welcome Back!</h2>
        <p>Please enter your credentials to access your account.</p>
    <hr>
    <h1>Login Form</h1>
    <form>
        <label>Name:</label><br>
        <input type="text" placeholder="Enter Fullname"><br><br>
        <label>Email:</label><br>
        <input type="email" placeholder="example@gmail.com"><br><br>
        <label>Password:</label><br>
        <input type="password" placeholder="........"><br><br>
        <label>Dob:</label><br>
        <input type="date" placeholder="dd-mm-yyyyy"><br><br>
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male">male
        <input type="radio" name="gender" value="female">female
        <input type="radio" name="gender" value="other">other
        <br><br>
        <label>Phone no:</label>
        <select>
            <option value=""></option>
            <option>+1</option>
            <option>+91</option>
            <option>+44</option>
            <option>+61</option>
            <option>+78</option>
        </select>
        <input type="tel" placeholder="0123456789"><br><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
